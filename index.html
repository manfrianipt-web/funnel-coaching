<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Candidatura Recomposition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 p-6 text-white">
    <div class="max-w-xl mx-auto bg-slate-900 p-8 rounded-2xl">
        <h1 class="text-2xl font-bold mb-6">Candidatura Recomposition</h1>
        
        <form action="mailto:tua-email@esempio.com" method="POST" enctype="text/plain" class="space-y-4">
            
            <label class="block text-sm">Nome e Cognome</label>
            <input type="text" name="Nome" required class="w-full p-2 bg-slate-800 rounded">
            
            <label class="block text-sm">Motivazione</label>
            <textarea name="Motivazione" class="w-full p-2 bg-slate-800 rounded"></textarea>
            
            <button type="submit" class="w-full bg-emerald-500 p-3 rounded font-bold">Invia via Email</button>
        </form>
    </div>
</body>
</html>
